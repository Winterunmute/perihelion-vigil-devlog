title: "PERIHELION VIGIL // DEVLOG"
description: "Development logs for Perihelion Vigil — a low-fidelity space RPG built by one person."
baseurl: "/perihelion-vigil-devlog"
url: "https://winterunmute.github.io"
author: "Crux / Rickard Borchers"
portfolio_url: "https://winterunmute.github.io/Portfolio/"

# Engagement tracking (Umami Cloud). See ANALYTICS.md for setup.
# Leave umami_website_id blank to disable all analytics (e.g. local builds).
analytics:
  umami_website_id: "4824585c-a33c-43ff-a5e5-bb4a42c74092"
  umami_src: "https://cloud.umami.is/script.js"

markdown: kramdown
highlighter: rouge
permalink: /log/:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

plugins:
  - jekyll-feed
  - jekyll-sitemap

exclude:
  - README.md
  - MEDIA-NOTES.md
  - ANALYTICS.md
  - Gemfile
  - Gemfile.lock
